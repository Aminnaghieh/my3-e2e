<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ما دو نفر 💑</title>
    <!-- Tailwind CSS برای استایل‌دهی سریع و جذاب -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- اسکریپت رسمی تلگرام برای وب‌اپ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #1a202c; color: #fff; }
        .tab-active { background-color: #ec4899; color: white; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- هدر بالا -->
    <div class="p-4 bg-pink-600 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold">روتین ما 💕</h1>
        <div id="vibe-display" class="text-3xl cursor-pointer" onclick="changeVibe()">💖</div>
    </div>

    <!-- محتوای تب‌ها -->
    <div id="app-content" class="p-4 space-y-4">
        <!-- دیتا اینجا لود میشه -->
        <p class="text-center text-gray-400 mt-10">در حال اتصال به قلب شما... ❤️</p>
    </div>

    <!-- نوار پایین (Navigation) -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-800 flex justify-around p-2 border-t border-gray-700">
        <button onclick="switchTab('notes')" class="flex-1 py-2 rounded-lg">📝<br>نوت</button>
        <button onclick="switchTab('todo')" class="flex-1 py-2 rounded-lg">✅<br>تو-دو</button>
        <button onclick="switchTab('game')" class="flex-1 py-2 rounded-lg">🎮<br>بازی</button>
        <button onclick="switchTab('panel')" class="flex-1 py-2 rounded-lg">🏆<br>رقابت</button>
    </div>

    <script>
        // دریافت اطلاعات کاربر از تلگرام (در محژه واقعی باید هش رو در بک‌اند اعتبارسنجی کنید)
        let tgUser = window.Telegram.WebApp.initDataUnsafe?.user || { id: 123456789, first_name: 'علی' };
        let currentTab = 'notes';
        let appData = {};

        // فراخوانی API اولیه
        async function loadData() {
            // در پروژه واقعی آدرس سرور رندر رو اینجا میذارید
            const res = await fetch(`/api/dashboard/?tg_id=${tgUser.id}`);
            appData = await res.json();
            document.getElementById('vibe-display').innerText = appData.user.avatar;
            renderTab(currentTab);
        }

        function renderTab(tab) {
            const content = document.getElementById('app-content');
            content.innerHTML = ''; // پاک کردن محتوای قبلی
            
            if (tab === 'notes') {
                let html = `<div class="flex gap-2 mb-4">
                    <input type="text" id="note-input" class="flex-1 p-2 bg-gray-700 rounded text-white" placeholder="چی تو ذهنته؟">
                    <button onclick="addNote()" class="bg-pink-600 p-2 rounded">ثبت</button>
                </div>`;
                appData.notes.forEach(n => {
                    html += `<div class="bg-gray-800 p-3 rounded-lg shadow">
                        <p>${n.text}</p>
                        <small class="text-pink-400">${n.author} - همین الان</small>
                    </div>`;
                });
                content.innerHTML = html;
            } 
            else if (tab === 'todo') {
                let html = `<h2 class="text-lg font-bold mb-2">لیست کارها</h2>`;
                appData.todos.forEach(t => {
                    html += `<div class="flex items-center gap-2 bg-gray-800 p-2 rounded">
                        <input type="checkbox" ${t.is_done ? 'checked' : ''} class="w-5 h-5 accent-pink-600">
                        <span class="${t.is_done ? 'line-through text-gray-500' : ''}">${t.title}</span>
                    </div>`;
                });
                content.innerHTML = html;
            }
            else if (tab === 'game') {
                content.innerHTML = `
                    <div class="text-center">
                        <h2 class="text-xl font-bold mb-4">بازی سرعت واکنش 🧠</h2>
                        <p>روی دکمه کلیک کن تا ۵ ثانیه بیشترین کلیک رو داشته باشی!</p>
                        <button id="tap-btn" class="bg-purple-600 text-2xl font-bold w-32 h-32 rounded-full mt-6 mx-auto block">شروع!</button>
                        <p id="game-score" class="mt-4 text-3xl"></p>
                    </div>`;
                initTapGame();
            }
            else if (tab === 'panel') {
                let html = `<h2 class="text-lg font-bold mb-4">پنل رقابتی 🏆</h2>`;
                appData.leaderboard.forEach((u, i) => {
                    html += `<div class="flex justify-between bg-gray-800 p-3 rounded mb-2 ${i === 0 ? 'border-2 border-yellow-400' : ''}">
                        <span>${i+1}. ${u.name} ${u.avatar_emoji}</span>
                        <span class="font-bold text-pink-400">${u.points} امتیاز</span>
                    </div>`;
                });
                content.innerHTML = html;
            }
        }

        // لااجیک بازی ساده
        function initTapGame() {
            const btn = document.getElementById('tap-btn');
            const scoreDisplay = document.getElementById('game-score');
            let score = 0;
            let timeLeft = 5;
            let gameInterval;

            btn.onclick = () => {
                if (btn.innerText === 'شروع!') {
                    btn.innerText = 'کلیک کن!';
                    gameInterval = setInterval(() => {
                        timeLeft--;
                        if (timeLeft <= 0) {
                            clearInterval(gameInterval);
                            btn.innerText = 'تمام!';
                            scoreDisplay.innerText = `امتیاز شما: ${score}`;
                            // ارسال امتیاز به سرور
                            fetch('/api/game/score/', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({tg_id: tgUser.id, name: tgUser.first_name, game_name: 'TapBattle', score: score})
                            }).then(() => loadData());
                        }
                    }, 1000);
                } else if (btn.innerText === 'کلیک کن!') {
                    score++;
                    scoreDisplay.innerText = score;
                }
            }
        }

        // توابع کمکی
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            event.currentTarget.classList.add('tab-active');
            renderTab(tab);
        }

        async function addNote() {
            const input = document.getElementById('note-input');
            if(input.value.trim() === '') return;
            await fetch('/api/note/add/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tg_id: tgUser.id, name: tgUser.first_name, text: input.value})
            });
            input.value = '';
            loadData();
        }

        async function changeVibe() {
            const emojis = ['💖', '🥰', '😴', '😡', '🤒', '🎉'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            await fetch('/api/vibe/update/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tg_id: tgUser.id, name: tgUser.first_name, emoji: randomEmoji})
            });
            loadData();
        }

        // استارت اولیه
        window.onload = () => {
            window.Telegram.WebApp.expand(); // فول اسکرین شدن مینی‌اپ
            loadData();
        };
    </script>
</body>
</html>
