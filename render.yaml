# render.yaml
# Phase 2 deployment config for Render.

services:
  # ── Django Web Service ──────────────────────────────────────────
  - type: web
    name: couple-routine-app
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --no-input
      python manage.py collectstatic --no-input

    startCommand: gunicorn app.wsgi:application --bind 0.0.0.0:$PORT --workers 1

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_TG_IDS
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MEDIA_RETENTION_DAYS
        value: "30"

